services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        INTERNAL_API_URL: http://portfolio-api-local:5000
    ports:
      - "3002:3002"
    container_name: portfolio-christian-local
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      - INTERNAL_API_URL=http://portfolio-api-local:5000
    volumes:
      - portfolio-public-local:/app/public
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    container_name: portfolio-api-local
    restart: unless-stopped
    env_file:
      - ./api/.env.local
    environment:
      - PUBLIC_DIR=/app/public
      # Sobreescribe MONGODB_URI para usar el hostname del servicio Docker (no localhost)
      - MONGODB_URI=mongodb://mongo:27017/portfolio
    volumes:
      - portfolio-public-local:/app/public
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s

  mongo:
    image: mongo:7
    container_name: portfolio-mongo-local
    restart: unless-stopped
    command: ["mongod", "--quiet"]
    ports:
      - "27017:27017"
    volumes:
      - portfolio-mongo-data-local:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  portfolio-public-local:
  portfolio-mongo-data-local:
