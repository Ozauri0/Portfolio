services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://christianferrer.me}
        INTERNAL_API_URL: http://portfolio-api:5000
    # ports:              <--- No se exponen puertos, accesible solo via nginx
    #   - "3002:3002"
    container_name: portfolio-christian
    restart: always
    env_file:
      - .env
    volumes:
      - portfolio-public:/app/public
    depends_on:
      api:
        condition: service_healthy
    networks:
      - red-internet

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    # ports:              <--- No se exponen puertos, accesible solo via nginx
    #   - "5000:5000"
    container_name: portfolio-api
    restart: always
    env_file:
      - ./api/.env
    environment:
      - PUBLIC_DIR=/app/public
      - MONGODB_URI=mongodb://mongo:27017/portfolio
    volumes:
      - portfolio-public:/app/public
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - red-internet
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s

  mongo:
    image: mongo:7
    container_name: portfolio-mongo
    restart: always
    volumes:
      - portfolio-mongo-data:/data/db
    # No se exponen puertos, solo accesible internamente
    networks:
      - red-internet
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  portfolio-public:
  portfolio-mongo-data:

networks:
  red-internet:
    external: true